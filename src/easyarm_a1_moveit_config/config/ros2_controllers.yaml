# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 250  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    constraints:
      stopped_velocity_tolerance: 0.1