###############################################
# EasyArm A1 MoveIt Servo parameters
###############################################

use_gazebo: false

## Incoming commands
# speed_units means Twist uses m/s and rad/s, JointJog uses rad/s.
command_in_type: "speed_units"

scale:
  linear: 0.05
  rotational: 0.3
  joint: 0.3

# Use MoveIt Servo's internal scaling around singularities and collisions.
override_velocity_scaling_factor: 0.0

## Outgoing commands
publish_period: 0.005
low_latency_mode: false

smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

## Planning scene ownership
is_primary_planning_scene_monitor: false

## MoveIt model
move_group_name: arm
planning_frame: base_link
ee_frame_name: Link6
robot_link_command_frame: base_link

## Stop behavior
incoming_command_timeout: 0.1
num_outgoing_halt_msgs_to_publish: 4

## Singularity and joint-limit handling
lower_singularity_threshold: 17.0
hard_stop_singularity_threshold: 30.0
joint_limit_margin: 0.1
leaving_singularity_threshold_multiplier: 2.0

## Topic names
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status

# EasyArmServoController supports two output formats:
# 1. trajectory_msgs/JointTrajectory -> /easyarm_servo_controller/joint_trajectory
#    Carries positions, velocities, and accelerations. This is the default path.
# 2. std_msgs/Float64MultiArray -> /easyarm_servo_controller/joint_positions
#    Position-only fallback. If using this path, set publish_joint_velocities and
#    publish_joint_accelerations to false because Humble Servo requires
#    Float64MultiArray output to be positions OR velocities, not both.

command_out_type: trajectory_msgs/JointTrajectory
command_out_topic: /easyarm_servo_controller/joint_trajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: true

# Float64MultiArray position-only fallback:

# command_out_type: std_msgs/Float64MultiArray
# command_out_topic: /easyarm_servo_controller/joint_positions
# publish_joint_positions: true
# publish_joint_velocities: false
# publish_joint_accelerations: false

## Collision checking
check_collisions: true

collision_check_rate: 10.0
self_collision_proximity_threshold: 0.005
scene_collision_proximity_threshold: 0.005
